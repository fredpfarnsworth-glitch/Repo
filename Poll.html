<!DOCTYPE html>
<html>
<head>
  <title>Congress Party Quiz</title>
</head>
<body>
  <h1>Congress Party Quiz</h1>

  <img id="photo" src="" style="max-width:300px;"><br>

  <h2 id="name">Loading...</h2>

  <button onclick="guess('Democrat')">Democrat</button>
  <button onclick="guess('Republican')">Republican</button>
  <button onclick="guess('Independent')">Independent</button>

  <p id="result"></p>
  <p id="score"></p>

  <script>
    const members = [
      {
        name: "Alexandria Ocasio-Cortez",
        party: "Democrat",
        photo: "https://upload.wikimedia.org/wikipedia/commons/4/44/Alexandria_Ocasio-Cortez_Official_Portrait.jpg"
      },
      {
        name: "Ted Cruz",
        party: "Republican",
        photo: "https://upload.wikimedia.org/wikipedia/commons/8/87/Ted_Cruz_official_116th_portrait.jpg"
      },
      {
        name: "Bernie Sanders",
        party: "Independent",
        photo: "https://upload.wikimedia.org/wikipedia/commons/d/de/Bernie_Sanders.jpg"
      }
    ];

    let current = 0;
    let correct = 0;
    let answered = 0;

    function showMember() {
      if (current >= members.length) {
        document.getElementById("name").innerText = "Quiz complete!";
        document.getElementById("photo").style.display = "none";
        document.getElementById("result").innerText =
          "Final score: " + correct + " out of " + answered;
        document.getElementById("score").innerText =
          "Accuracy: " + Math.round((correct / answered) * 100) + "%";
        return;
      }

      document.getElementById("photo").style.display = "block";
      document.getElementById("photo").src = members[current].photo;
      document.getElementById("name").innerText = members[current].name;
      document.getElementById("result").innerText = "";
      document.getElementById("score").innerText =
        "Score: " + correct + " / " + answered;
    }

    function guess(choice) {
      answered++;

      if (choice === members[current].party) {
        correct++;
        document.getElementById("result").innerText = "Correct!";
      } else {
        document.getElementById("result").innerText =
          "Wrong. Correct answer: " + members[current].party;
      }

      current++;

      setTimeout(showMember, 1000);
    }

    showMember();
  </script>
</body>
</html>
