<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Congress Party Quiz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 10px auto;
      text-align: center;
      padding: 10px;
    }

    #photo {
      display: block;
      margin: 0 auto;
      width: 150px;
      height: 185px;
      object-fit: cover;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      font-size: 14px;
      padding: 8px 10px;
      margin: 3px;
      cursor: pointer;
    }

    #score, #accuracy, #progressNote {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      margin: 8px 0;
    }

    #result {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
      min-height: 24px;
    }

    #resetButton {
      margin-top: 12px;
      font-size: 13px;
      padding: 7px 10px;
    }
  </style>
</head>

<body>
  <h1>Congress Party Quiz</h1>

  <p id="status">Loading...</p>

  <img id="photo" src="" style="display:none;">

  <div id="buttons" style="display:none;">
    <button onclick="guess('Democrat')">Democrat</button>
    <button onclick="guess('Republican')">Republican</button>
    <button onclick="guess('Independent')">Independent</button>
  </div>

  <p id="result"></p>
  <p id="score"></p>
  <p id="accuracy"></p>
  <p id="progressNote"></p>

  <button id="resetButton" onclick="startOver()" style="display:none;">
    Start Over
  </button>

  <script>
    let members = [];
    let current = 0;
    let correct = 0;
    let answered = 0;

    const STORAGE_KEY = "congressPartyQuizProgressV1";

    async function loadMembers() {
      try {
        const response = await fetch("members.json?v=" + Date.now());
        const loadedMembers = await response.json();

        if (!Array.isArray(loadedMembers) || loadedMembers.length === 0) {
          document.getElementById("status").innerText =
            "members.json is empty or not valid.";
          return;
        }

        const saved = loadProgress();

        if (
          saved &&
          Array.isArray(saved.members) &&
          saved.members.length === loadedMembers.length
        ) {
          members = saved.members;
          current = saved.current || 0;
          correct = saved.correct || 0;
          answered = saved.answered || 0;

          document.getElementById("progressNote").innerText =
            "Resumed saved quiz.";
        } else {
          members = loadedMembers;
          shuffle(members);
          current = 0;
          correct = 0;
          answered = 0;
          saveProgress();
        }

        document.getElementById("status").style.display = "none";
        document.getElementById("buttons").style.display = "block";
        document.getElementById("resetButton").style.display = "inline-block";

        showMember();

      } catch (error) {
        document.getElementById("status").innerText =
          "Error loading members.json";
        console.error(error);
      }
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function normalizeParty(party) {
      return String(party).trim().toLowerCase();
    }

    function saveProgress() {
      const progress = {
        members: members,
        current: current,
        correct: correct,
        answered: answered
      };

      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }

    function loadProgress() {
      const savedText = localStorage.getItem(STORAGE_KEY);

      if (!savedText) {
        return null;
      }

      try {
        return JSON.parse(savedText);
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
        return null;
      }
    }

    function resetProgress() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function updateScore() {
      let questionNumber = current + 1;

      if (questionNumber > members.length) {
        questionNumber = members.length;
      }

      const accuracy =
        answered > 0 ? ((correct / answered) * 100).toFixed(1) : "0.0";

      document.getElementById("score").innerText =
        "Question " + questionNumber + " of " + members.length +
        " | Score: " + correct + "/" + answered;

      document.getElementById("accuracy").innerText =
        "Accuracy: " + accuracy + "%";
    }

    function showMember() {
      if (current >= members.length) {
        document.getElementById("photo").style.display = "none";
        document.getElementById("buttons").style.display = "none";

        document.getElementById("result").innerText =
          "Quiz Complete! Final Score: " + correct + " / " + answered;

        const finalAccuracy =
          answered > 0 ? ((correct / answered) * 100).toFixed(1) : "0.0";

        document.getElementById("score").innerText = "";
        document.getElementById("accuracy").innerText =
          "Final Accuracy: " + finalAccuracy + "%";

        document.getElementById("progressNote").innerText =
          "Finished. Tap Start Over to play again.";

        resetProgress();

        return;
      }

      const m = members[current];

      document.getElementById("photo").style.display = "block";
      document.getElementById("photo").src = m.photo;

      document.getElementById("photo").onerror = function () {
        this.style.display = "none";
      };

      document.getElementById("result").innerText = "";

      updateScore();
    }

    function guess(choice) {
      const m = members[current];

      answered++;

      if (normalizeParty(choice) === normalizeParty(m.party)) {
        correct++;
        document.getElementById("result").innerText = "Correct!";
      } else {
        document.getElementById("result").innerText =
          "Wrong. Correct answer: " + m.party;
      }

      current++;

      saveProgress();
      updateScore();

      setTimeout(showMember, 1000);
    }

    function startOver() {
      resetProgress();

      current = 0;
      correct = 0;
      answered = 0;

      shuffle(members);
      saveProgress();

      document.getElementById("progressNote").innerText =
        "Started over.";

      document.getElementById("buttons").style.display = "block";

      showMember();
    }

    loadMembers();
  </script>
</body>
</html>
