<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Congress Party Quiz</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 10px auto;
      text-align: center;
      padding: 10px;
    }

    #photo {
      display: block;
      margin-left: auto;
      margin-right: auto;
      width: 180px;
      height: 220px;
      object-fit: cover;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    

    button {
      font-size: 16px;
      padding: 9px 12px;
      margin: 4px;
      cursor: pointer;
    }

    #score, #accuracy {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin: 8px 0;
    }

    #result {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      #photo {
        width: 150px;
        height: 185px;
      }

      button {
        font-size: 14px;
        padding: 8px 10px;
        margin: 3px;
      }

      h1 {
        font-size: 22px;
      }

      

      #score, #accuracy {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <h1>Congress Party Quiz</h1>

  <p id="status">Loading...</p>

  <img id="photo" src="" style="display:none;">

  

  <div id="buttons" style="display:none;">
    <button onclick="guess('Democrat')">Democrat</button>
    <button onclick="guess('Republican')">Republican</button>
    <button onclick="guess('Independent')">Independent</button>
  </div>

  <p id="result"></p>
  <p id="score"></p>
  <p id="accuracy"></p>

  <script>
    let members = [];
    let current = 0;
    let correct = 0;
    let answered = 0;

    async function loadMembers() {
      try {
        const response = await fetch("members.json?v=" + Date.now());
        members = await response.json();

        if (!Array.isArray(members) || members.length === 0) {
          document.getElementById("status").innerText =
            "members.json is empty or not valid.";
          return;
        }

        shuffle(members);

        document.getElementById("status").style.display = "none";
        document.getElementById("buttons").style.display = "block";

        showMember();

      } catch (error) {
        document.getElementById("status").innerText =
          "Error loading members.json";
        console.error(error);
      }
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function updateScore() {
      const accuracy =
        answered > 0 ? ((correct / answered) * 100).toFixed(1) : "0.0";

      document.getElementById("score").innerText =
        "Question " + (current + 1) + " of " + members.length +
        " | Score: " + correct + "/" + answered;

      document.getElementById("accuracy").innerText =
        "Accuracy: " + accuracy + "%";
    }

    function normalizeParty(party) {
      return String(party).trim().toLowerCase();
    }

    function showMember() {
      if (current >= members.length) {
        document.getElementById("photo").style.display = "none";
        document.getElementById("buttons").style.display = "none";
        document.getElementById("name").innerText = "Quiz Complete!";
        document.getElementById("result").innerText =
          "Final Score: " + correct + " / " + answered;

        const finalAccuracy =
          answered > 0 ? ((correct / answered) * 100).toFixed(1) : "0.0";

        document.getElementById("score").innerText = "";
        document.getElementById("accuracy").innerText =
          "Final Accuracy: " + finalAccuracy + "%";
        return;
      }

      const m = members[current];

      document.getElementById("photo").style.display = "block";
      document.getElementById("photo").src = m.photo;
      document.getElementById("photo").onerror = function () {
        this.style.display = "none";
      };

      document.getElementById("name").innerText = m.name;
      document.getElementById("result").innerText = "";

      updateScore();
    }

    function guess(choice) {
      const m = members[current];

      answered++;

      if (normalizeParty(choice) === normalizeParty(m.party)) {
        correct++;
        document.getElementById("result").innerText = "Correct!";
      } else {
        document.getElementById("result").innerText =
          "Wrong. Correct answer: " + m.party;
      }

      current++;

      setTimeout(showMember, 1000);
    }00

    loadMembers();
  </script>
</body>
</html>
