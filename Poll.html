<!DOCTYPE html>
<html>
<head>
  <title>Congress Party Quiz</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    img { width: 225px; height: 275px; object-fit: cover; border-radius: 8px; }
    button { font-size: 18px; margin: 6px; padding: 10px 16px; }
    #result { font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Congress Party Quiz</h1>

  <p id="status">Loading members of Congress...</p>

  <img id="photo" style="display:none;">
  <h2 id="name"></h2>
  <p id="info"></p>

  <div id="buttons" style="display:none;">
    <button onclick="guess('Democrat')">Democrat</button>
    <button onclick="guess('Republican')">Republican</button>
    <button onclick="guess('Independent')">Independent</button>
  </div>

  <p id="result"></p>
  <p id="score"></p>

  <script>
    let members = [];
    let current = 0;
    let correct = 0;
    let answered = 0;

    const dataUrl =
      "https://raw.githubusercontent.com/unitedstates/congress-legislators/main/legislators-current.json";

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    async function loadMembers() {
      try {
        const response = await fetch(dataUrl);
        const data = await response.json();

        members = data.map(m => {
          const term = m.terms[m.terms.length - 1];
          const name = m.name.official_full ||
                       [m.name.first, m.name.middle, m.name.last].filter(Boolean).join(" ");

          return {
            name: name,
            party: term.party,
            state: term.state,
            type: term.type === "sen" ? "Senator" : "Representative",
            district: term.district,
            bioguide: m.id.bioguide,
            photo: "https://unitedstates.github.io/images/congress/225x275/" +
                   m.id.bioguide + ".jpg"
          };
        });

        shuffle(members);
        document.getElementById("status").innerText =
          "Loaded " + members.length + " members.";
        document.getElementById("buttons").style.display = "block";
        showMember();

      } catch (error) {
        document.getElementById("status").innerText =
          "Could not load Congress data. Check your internet connection or GitHub Pages.";
        console.error(error);
      }
    }
