<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Congress Party Quiz</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  max-width: 700px;
  margin: 20px auto;
  text-align: center;
}

    img {
      width: 180px;
      height: 220px;
      object-fit: cover;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 18px;
      cursor: pointer;
    }

    #result {
      font-weight: bold;
      font-size: 20px;
      margin-top: 10px;
    }

    #score {
      margin-top: 10px;
      font-size: 18px;
    }
    #photo {
  display: block;
  margin-left: auto;
  margin-right: auto;
}

#name {
  text-align: center;
  width: 100%;
}
    @media (max-width: 768px) {
  img {
    width: 300px;
    height: auto;
  }

  button {
    font-size: 24px;
    padding: 15px 25px;
  }

  body {
    font-size: 20px;
  }
}
    @media (max-width: 768px) {
  img {
    width: 160px;
    height: 195px;
  }

  button {
    font-size: 14px;
    padding: 8px 12px;
    margin: 3px;
  }

  h1 {
    font-size: 24px;
  }

  h2 {
    font-size: 18px;
  }

  body {
    margin: 10px;
  }
}
  </style>
</head>
<body>

<h1>Congress Party Quiz</h1>

<p id="status">Loading...</p>

<div id="memberCard">
  <img id="photo" src="" style="display:none;">
  <h2 id="name"></h2>
</div>

<div id="buttons" style="display:none;">
  <button onclick="guess('Democrat')">Democrat</button>
  <button onclick="guess('Republican')">Republican</button>
  <button onclick="guess('Independent')">Independent</button>
</div>

<p id="result"></p>
<p id="score"></p>

<script>

let members = [];
let current = 0;
let correct = 0;
let answered = 0;

async function loadMembers() {
  try {

    const response = await fetch("members.json");
    members = await response.json();

    if (members.length === 0) {
      document.getElementById("status").innerText =
        "members.json contains no members.";
      return;
    }

    shuffle(members);

    document.getElementById("status").style.display = "none";
    document.getElementById("buttons").style.display = "block";

    showMember();

  } catch (error) {
    document.getElementById("status").innerText =
      "Error loading members.json";
    console.error(error);
  }
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showMember() {

  if (current >= members.length) {

    document.getElementById("photo").style.display = "none";
    document.getElementById("buttons").style.display = "none";

    document.getElementById("name").innerText =
      "Quiz Complete!";

    document.getElementById("result").innerText =
      "Final Score: " + correct + " / " + answered;

    document.getElementById("score").innerText =
      "Accuracy: " +
      Math.round((correct / answered) * 100) +
      "%";

    return;
  }

  const m = members[current];

  document.getElementById("photo").style.display = "block";
  document.getElementById("photo").src = m.photo;

  document.getElementById("name").innerText = m.name;

  let accuracy = 0;

if (answered > 0) {
  accuracy = (correct / answered * 100).toFixed(1);
}

document.getElementById("score").innerText =
  "Question " +
  (current + 1) +
  " of " +
  members.length +
  " | Score: " +
  correct +
  "/" +
  answered +
  " | Accuracy: " +
  accuracy +
  "%";

  document.getElementById("result").innerText = "";
}

function guess(choice) {

  current++;
setTimeout(showMember, 1000);
  
  answered++;

  if (choice === members[current].party) {

    correct++;

    document.getElementById("result").innerText =
      "Correct!";

  } else {

    document.getElementById("result").innerText =
      "Wrong. Correct answer: " +
      members[current].party;
  }

  current++;

  setTimeout(showMember, 1000);
}

loadMembers();

</script>

</body>
</html>
