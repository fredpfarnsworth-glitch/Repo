<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>90th Congress Party Quiz</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:8px;
  background:#f5f5f5;
}

#quiz{
  max-width:420px;
  margin:0 auto;
}

#photo{
  max-width:100%;
  max-height:58vh;
  object-fit:contain;
  border-radius:8px;
  background:white;
}
  
  #name{
  font-size:18px;
  font-weight:bold;
  margin:5px 0;
}

#choices{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  max-width:420px;
  margin:8px auto 6px auto;
}

button{
  font-size:16px;
  padding:11px 3px;
  border-radius:8px;
  border:1px solid #333;
  background:white;
}

#stats{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  font-size:15px;
  margin-bottom:6px;
}

#feedback{
  font-size:18px;
  font-weight:bold;
  margin-top:6px;
}

#done{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<div id="quiz">
  <div id="name">Loading...</div>
  <img id="photo" src="">
  <div id="feedback"></div>
</div>

<div id="choices">
  <button onclick="answer('Democrat')">Democrat</button>
  <button onclick="answer('Republican')">Republican</button>
  <button onclick="answer('Independent')">Independent</button>
</div>

<div id="stats">
  <span id="score">Score: 0</span>
  <span id="accuracy">Accuracy: 0%</span>
  <span id="progress">0 / 0</span>
</div>

<div id="done">
  <h2>Quiz Complete</h2>
  <p id="finalStats"></p>
  <button onclick="restartQuiz()">Restart Quiz</button>
</div>

<script>
let members = [];
let current = 0;
let correct = 0;
let answered = 0;

fetch("members90.json")
  .then(response => response.json())
  .then(data => {
    members = data;

    const saved = JSON.parse(localStorage.getItem("congress90Progress"));
    if (saved) {
      current = saved.current || 0;
      correct = saved.correct || 0;
      answered = saved.answered || 0;
    }

    showMember();
  })
  .catch(error => {
    document.getElementById("name").textContent = "Could not load members90.json";
    console.error(error);
  });

function saveProgress() {
  localStorage.setItem("congress90Progress", JSON.stringify({
    current,
    correct,
    answered
  }));
}

function showMember() {
  if (current >= members.length) {
    finishQuiz();
    return;
  }

  const m = members[current];

  document.getElementById("name").textContent = m.name || "Unknown Member";
  document.getElementById("photo").src = m.photo || m.image || "";
  document.getElementById("feedback").textContent = "";

  updateStats();
}

function answer(choice) {
  const m = members[current];
  let actual = m.party || "";

  let normalizedActual = actual.toLowerCase();
  let isCorrect = false;

  if (choice === "Democrat" && normalizedActual.includes("democrat")) isCorrect = true;
  if (choice === "Republican" && normalizedActual.includes("republican")) isCorrect = true;
  if (choice === "Independent" && normalizedActual.includes("independent")) isCorrect = true;

  answered++;

  if (isCorrect) {
    correct++;
    document.getElementById("feedback").textContent = "Correct!";
  } else {
    document.getElementById("feedback").textContent = "Wrong. Answer: " + actual;
  }

  current++;
  saveProgress();
  updateStats();

  setTimeout(showMember, 900);
}

function updateStats() {
  document.getElementById("score").textContent = "Score: " + correct;
  document.getElementById("progress").textContent = current + " / " + members.length;

  let acc = answered === 0 ? 0 : Math.round((correct / answered) * 100);
  document.getElementById("accuracy").textContent = "Accuracy: " + acc + "%";
}

function finishQuiz() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("choices").style.display = "none";
  document.getElementById("done").style.display = "block";

  let acc = answered === 0 ? 0 : Math.round((correct / answered) * 100);
  document.getElementById("finalStats").textContent =
    "Final Score: " + correct + " out of " + answered + " — Accuracy: " + acc + "%";
}

function restartQuiz() {
  localStorage.removeItem("congress90Progress");
  current = 0;
  correct = 0;
  answered = 0;

  document.getElementById("quiz").style.display = "block";
  document.getElementById("choices").style.display = "grid";
  document.getElementById("done").style.display = "none";

  showMember();
}
</script>

</body>
</html>
